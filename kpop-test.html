<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-pop女爱豆风格测试</title>
    <link rel="stylesheet" href="kpop-style.css">
</head>
<body>
    <div class="test-container">
        <!-- 开始页面 -->
        <div class="start-screen" id="start-screen">
            <div class="start-content">
                <h1>K-pop女爱豆风格测试</h1>
                <p>通过回答10道问题，找到最适合你参考的女爱豆风格</p>
                <button id="start-btn" class="btn">开始测试</button>
                <p class="copyright">内容原创小红书@Juimong</p>
            </div>
        </div>
        
        <!-- 测试页面 -->
        <div class="test-screen" id="test-screen">
            <div class="test-content">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <div class="question-number" id="question-number">问题 1/10</div>
                <h2 class="question-text" id="question-text"></h2>
                <div class="options" id="options"></div>
            </div>
        </div>
        
        <!-- 结果页面 -->
        <div class="result-screen" id="result-screen">
            <div class="result-content">
                <h1>测试结果</h1>
                <div class="top-idol" id="top-idol">
                    <!-- 第一名将通过JS动态生成 -->
                </div>
                <div class="summary" id="summary">
                    <!-- 总结性话语将通过JS动态生成 -->
                </div>
                <div class="other-idols" id="other-idols">
                    <!-- 2-5名将通过JS动态生成 -->
                </div>
                <button id="restart-btn" class="btn">重新测试</button>
            </div>
        </div>
    </div>
    <script src="kpop-script.js"></script>
</body>
</html>
